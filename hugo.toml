baseURL = "https://theselfhostingblog.com/"
languageCode = "en-us"
title = "The Self-Hosting Blog"
theme = "PaperMod"
enableRobotsTXT = true

[pagination]
  pagerSize = 10

[taxonomies]
  tag = "tag"
  author = "author"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "github-dark"
    lineNos = false

[params]
  description = "Guides and tutorials on self-hosting, Linux, Docker, and open-source software."
  author = "Ed"
  defaultTheme = "dark"
  disableThemeToggle = true
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  cover.linkFullImages = true

[menu]
  [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "Guides"
    url = "/tag/guides/"
    weight = 2
  [[menu.main]]
    name = "Ramblings"
    url = "/tag/ramblings/"
    weight = 3
  [[menu.main]]
    name = "About Us"
    url = "/about-us/"
    weight = 4
  [[menu.main]]
    name = "Contact"
    url = "/contact/"
    weight = 5

[outputs]
  home = ["HTML", "RSS", "JSON"]
